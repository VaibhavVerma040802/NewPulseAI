<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a101a;
            font-family: 'DM Sans', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

        input,
        select,
        textarea {
            background: #0f1623;
            border: 1px solid #1e2d45;
            color: #f1f5f9;
            border-radius: 8px;
            padding: 9px 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus {
            border-color: #3b82f6;
        }

        input::placeholder,
        textarea::placeholder {
            color: #475569;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #0a101a;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e2d45;
            border-radius: 4px;
        }

        .art-card {
            background: #141e2e;
            border: 1px solid #1e2d45;
            border-radius: 12px;
            padding: 18px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .art-card:hover {
            border-color: #3b82f6;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3
            }

            50% {
                opacity: 1
            }
        }
    </style>
</head>

<body>

    <!-- SCREEN NAV -->
    <div id="screen-nav"
        style="background:#060d15;padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid #1e2d45;position:sticky;top:0;z-index:200">
    </div>

    <!-- MAIN -->
    <div id="main"></div>

    <script>
        const SCREENS = ["landing", "login", "register", "forgot", "onboarding", "dashboard", "feed", "article", "search", "chatbot", "timeline", "bookmarks", "profile", "admin"];
        const LABELS = { landing: "Landing", login: "Login", register: "Register", forgot: "Forgot PW", onboarding: "Onboarding", dashboard: "Dashboard", feed: "News Feed", article: "Article Detail", search: "Search", chatbot: "AI Chatbot", timeline: "Timeline", bookmarks: "Bookmarks", profile: "Profile", admin: "Admin" };
        const CATCOL = { Technology: "#6366f1", Business: "#0ea5e9", Politics: "#8b5cf6", Health: "#10b981", Finance: "#f59e0b", Science: "#06b6d4", Sports: "#ef4444", Entertainment: "#ec4899" };
        const SENTCOL = { POSITIVE: "#16a34a", NEUTRAL: "#d97706", NEGATIVE: "#dc2626" };
        const ARTS = [
            { id: 1, cat: "Technology", title: "OpenAI Releases GPT-5 with Unprecedented Reasoning Capabilities", src: "TechCrunch", ago: "2h ago", img: "🤖", sentiment: "POSITIVE", cred: 92, snippet: "OpenAI's latest model demonstrates 40% improvements in mathematical reasoning and 92% pass rates on professional coding tests…" },
            { id: 2, cat: "Business", title: "Apple Reports Record Q2 Revenue Driven by Services Growth", src: "Reuters", ago: "4h ago", img: "📊", sentiment: "POSITIVE", cred: 95, snippet: "Apple Inc. reported its strongest second quarter on record, with services revenue surpassing hardware for the first time…" },
            { id: 3, cat: "Politics", title: "G20 Summit Reaches Landmark Climate Finance Agreement", src: "BBC News", ago: "6h ago", img: "🌍", sentiment: "NEUTRAL", cred: 91, snippet: "Leaders agreed on a $500 billion climate adaptation fund, though implementation details remain contested…" },
            { id: 4, cat: "Health", title: "New mRNA Vaccine Shows 94% Efficacy Against Multiple Cancer Types", src: "Nature", ago: "8h ago", img: "💊", sentiment: "POSITIVE", cred: 97, snippet: "A groundbreaking clinical trial demonstrated personalized mRNA vaccines can target multiple tumor types simultaneously…" },
            { id: 5, cat: "Finance", title: "Federal Reserve Signals Potential Rate Cuts Amid Economic Uncertainty", src: "WSJ", ago: "10h ago", img: "💹", sentiment: "NEUTRAL", cred: 94, snippet: "The Federal Reserve chair hinted at possible rate reductions later this year, citing easing inflation pressures…" },
            { id: 6, cat: "Science", title: "James Webb Telescope Discovers Potential Signs of Life on Exoplanet K2-18b", src: "NASA", ago: "12h ago", img: "🔭", sentiment: "POSITIVE", cred: 89, snippet: "Spectroscopic analysis revealed chemical signatures that could indicate biological processes on the distant exoplanet…" },
        ];

        let curScreen = "landing";
        let bookmarked = [1, 4];
        let chatHistory = [{ role: "ai", text: "Hello! I'm your NewsPulse AI assistant. Ask me anything about today's news — I'll retrieve relevant articles and give you an intelligent answer with citations." }];
        let pwVal = "";
        let chatInput = "";
        let selInterests = ["Technology", "AI/ML", "Science"];
        let summaryType = "QUICK";
        let activeTab = "recommended";

        function go(s) { curScreen = s; render(); window.scrollTo(0, 0); }

        // Build nav
        function buildNav() {
            const nav = document.getElementById('screen-nav');
            nav.innerHTML = SCREENS.map(s => `<button onclick="go('${s}')" style="font-size:11px;padding:4px 10px;border-radius:14px;border:1px solid;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;background:${curScreen === s ? "#3b82f6" : "transparent"};border-color:${curScreen === s ? "#3b82f6" : "#1e2d45"};color:${curScreen === s ? "#fff" : "#64748b"};transition:all 0.15s">${LABELS[s]}</button>`).join('');
        }

        function navBar(active) {
            return `<nav style="background:#0f1623;border-bottom:1px solid #1e2d45;padding:0 20px;display:flex;align-items:center;height:56px;position:sticky;top:41px;z-index:100">
    <div onclick="go('landing')" style="cursor:pointer;display:flex;align-items:center;gap:8px;margin-right:auto">
      <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:15px">⚡</div>
      <span style="font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:18px;color:#f1f5f9">NewsPulse<span style="color:#3b82f6">AI</span></span>
    </div>
    ${["feed", "search", "chatbot", "timeline", "bookmarks", "dashboard", "admin"].map(s => `<button onclick="go('${s}')" style="background:none;border:none;color:${active === s ? "#3b82f6" : "#94a3b8"};font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:0 12px;height:56px;cursor:pointer;border-bottom:2px solid ${active === s ? "#3b82f6" : "transparent"};transition:all 0.2s">${LABELS[s]}</button>`).join('')}
    <div onclick="go('profile')" style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;cursor:pointer;margin-left:12px">AK</div>
  </nav>`;
        }

        function artCard(a, showFull) {
            const bm = bookmarked.includes(a.id);
            return `<div class="art-card" onclick="go('article')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
      <div style="flex:1">
        <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
          <span style="font-size:10px;font-weight:600;padding:3px 7px;border-radius:4px;background:${CATCOL[a.cat] || "#6366f1"}22;color:${CATCOL[a.cat] || "#818cf8"};text-transform:uppercase;letter-spacing:0.4px">${a.cat}</span>
          <span style="font-size:10px;font-weight:600;padding:3px 7px;border-radius:4px;background:${SENTCOL[a.sentiment]}22;color:${SENTCOL[a.sentiment]}">${a.sentiment}</span>
          <span style="font-size:10px;padding:3px 7px;border-radius:4px;background:#1e2d45;color:#94a3b8">✓ ${a.cred}/100</span>
        </div>
        <h3 style="font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:700;color:#f1f5f9;margin:0;line-height:1.4">${a.title}</h3>
      </div>
      <div style="font-size:28px;flex-shrink:0">${a.img}</div>
    </div>
    <p style="font-size:12px;color:#64748b;line-height:1.6;margin:8px 0">${a.snippet}</p>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:#475569">📰 ${a.src} · ${a.ago}</span>
      <button onclick="event.stopPropagation();toggleBm(${a.id})" style="background:none;border:none;font-size:16px;cursor:pointer;color:${bm ? "#f59e0b" : "#475569"}">${bm ? "★" : "☆"}</button>
    </div>
  </div>`;
        }

        function toggleBm(id) { bookmarked = bookmarked.includes(id) ? bookmarked.filter(x => x !== id) : [...bookmarked, id]; render(); }
        function calcStrength(v) { let s = 0; if (v.length >= 8) s++; if (/[A-Z]/.test(v)) s++; if (/[0-9]/.test(v)) s++; if (/[^a-zA-Z0-9]/.test(v)) s++; if (v.length >= 12) s++; return s; }

        const strLabel = ["", "Very Weak", "Weak", "Fair", "Strong", "Very Strong"];
        const strColor = ["", "#dc2626", "#ea580c", "#f59e0b", "#16a34a", "#15803d"];

        function pwStrengthBar(pw) {
            if (!pw) return '';
            const s = calcStrength(pw);
            return `<div style="margin-top:8px">
    <div style="display:flex;gap:3px;margin-bottom:4px">${[1, 2, 3, 4, 5].map(i => `<div style="flex:1;height:3px;border-radius:2px;background:${i <= s ? strColor[s] : "#1e2d45"};transition:background 0.3s"></div>`).join('')}</div>
    <span style="font-size:11px;color:${strColor[s]};font-weight:500">${strLabel[s]}</span>
  </div>`;
        }

        function screens() {
            switch (curScreen) {

                case "landing": return `
    <div style="min-height:100vh;background:#0a101a">

        <button onclick="go('register')" style="background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;color:#fff;padding:7px 18px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600">Get Started</button>
      </nav>

        <div style="display:inline-flex;align-items:center;gap:7px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);border-radius:20px;padding:5px 14px;margin-bottom:28px">

        <div style="display:flex;gap:14px;justify-content:center">
          <button onclick="go('register')" style="background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;color:#fff;padding:12px 32px;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600">Start for free →</button>
          <button onclick="go('dashboard')" style="background:transparent;border:1px solid #1e2d45;color:#94a3b8;padding:12px 32px;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px">View Demo</button>
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:0 20px 48px">
        ${["AI Summaries", "Sentiment Analysis", "Named Entities", "Event Timelines", "RAG Chatbot", "Credibility Scores", "Daily Brief", "Personalized Feed"].map(f => `<span style="background:#141e2e;border:1px solid #1e2d45;color:#94a3b8;padding:7px 16px;border-radius:20px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500">${f}</span>`).join('')}
      </div>
      <div style="max-width:1000px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px">
        ${[["⚡", "AI Summaries", "BART + GPT-4o powered summaries at Quick, Detailed, and Executive levels. Read 10 articles in 2 minutes.", "#3b82f6"], ["💬", "Conversational News", "Ask questions about any article or topic. Our RAG pipeline retrieves relevant context and generates cited answers.", "#8b5cf6"], ["📊", "Sentiment Dashboard", "Real-time sentiment analysis across all news categories with interactive charts and trend visualization.", "#10b981"], ["🔍", "Entity Intelligence", "NER extracts persons, organizations, and events — enabling entity-based exploration and search.", "#f59e0b"], ["📅", "Event Timelines", "Track how any story evolves over time. Auto-generated timelines cluster related articles chronologically.", "#06b6d4"], ["🎯", "Credibility Scoring", "Cross-source verification and source reputation analysis to surface the most reliable reporting.", "#ec4899"]].map(([ic, t, d, c]) => `<div style="background:#141e2e;border:1px solid #1e2d45;border-radius:14px;padding:24px"><div style="font-size:28px;margin-bottom:12px">${ic}</div><h3 style="font-family:'Playfair Display',Georgia,serif;font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:8px">${t}</h3><p style="color:#64748b;font-size:13px;line-height:1.6;font-family:'DM Sans',sans-serif">${d}</p></div>`).join('')}
      </div>
      <div style="background:linear-gradient(135deg,#0f1d35,#14122a);border-top:1px solid #1e2d45;padding:60px 20px;text-align:center">
        <h2 style="font-family:'Playfair Display',Georgia,serif;font-size:36px;font-weight:800;color:#f1f5f9;margin-bottom:12px">Start reading smarter today</h2>
        <p style="color:#64748b;font-size:15px;margin-bottom:28px;font-family:'DM Sans',sans-serif">Free to use. No credit card. Built as MCA Final Year Project.</p>
        <button onclick="go('register')" style="background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;color:#fff;padding:12px 40px;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600">Create Your Account →</button>
      </div>
    </div>`;

                case "login": return `
    <div style="min-height:100vh;background:#0a101a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px">
      <div style="margin-bottom:28px;text-align:center">
        <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 14px">⚡</div>
        <h1 style="font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:700;color:#f1f5f9">Welcome back</h1>
        <p style="color:#64748b;font-size:13px;font-family:'DM Sans',sans-serif;margin-top:5px">Sign in to your NewsPulseAI account</p>
      </div>
      <div style="width:100%;max-width:400px;background:#141e2e;border:1px solid #1e2d45;border-radius:16px;padding:32px">
        <div style="display:flex;gap:10px;margin-bottom:20px">
          <button style="flex:1;padding:9px 0;border-radius:8px;border:1px solid #1e2d45;background:#0f1623;color:#94a3b8;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px">🔴 Google</button>
          <button style="flex:1;padding:9px 0;border-radius:8px;border:1px solid #1e2d45;background:#0f1623;color:#94a3b8;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px">⚫ GitHub</button>
        </div>

          <div style="flex:1;height:1px;background:#1e2d45"></div>
          <span style="color:#475569;font-size:11px;font-family:'DM Sans',sans-serif">or continue with email</span>
          <div style="flex:1;height:1px;background:#1e2d45"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:14px">
          <div><label style="color:#94a3b8;font-size:12px;font-family:'DM Sans',sans-serif;display:block;margin-bottom:5px;font-weight:500">Email address</label><input type="email" placeholder="you@example.com" value="alex.kumar@example.com" style="font-size:13px"></div>
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:5px">
              <label style="color:#94a3b8;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500">Password</label>
              <span onclick="go('forgot')" style="color:#3b82f6;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">Forgot password?</span>
            </div>
            <input type="password" placeholder="••••••••" value="password123">
          </div>
          <label style="display:flex;align-items:center;gap:7px;cursor:pointer"><input type="checkbox" checked style="width:auto;accent-color:#3b82f6"><span style="color:#64748b;font-size:12px;font-family:'DM Sans',sans-serif">Remember me for 30 days</span></label>
          <button onclick="go('dashboard')" style="background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;color:#fff;padding:11px 0;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600">Sign In</button>
        </div>
        <p style="color:#475569;font-size:12px;text-align:center;margin-top:18px;font-family:'DM Sans',sans-serif">Don't have an account? <span onclick="go('register')" style="color:#3b82f6;cursor:pointer">Sign up free</span></p>
      </div>
    </div>`;

                case "register": return `
    <div style="min-height:100vh;background:#0a101a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px">
      <div style="margin-bottom:24px;text-align:center">
        <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 14px">⚡</div>
        <h1 style="font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:700;color:#f1f5f9">Create your account</h1>
        <p style="color:#64748b;font-size:13px;font-family:'DM Sans',sans-serif;margin-top:5px">Free forever. No credit card required.</p>
      </div>
      <div style="width:100%;max-width:420px;background:#141e2e;border:1px solid #1e2d45;border-radius:16px;padding:32px">
        <div style="display:flex;flex-direction:column;gap:14px">
          <div><label style="color:#94a3b8;font-size:12px;font-family:'DM Sans',sans-serif;display:block;margin-bottom:5px;font-weight:500">Full Name</label><input type="text" placeholder="Alex Kumar"></div>
          <div><label style="color:#94a3b8;font-size:12px;font-family:'DM Sans',sans-serif;display:block;margin-bottom:5px;font-weight:500">Email Address</label><input type="email" placeholder="you@example.com"></div>
          <div>
            <label style="color:#94a3b8;font-size:12px;font-family:'DM Sans',sans-serif;display:block;margin-bottom:5px;font-weight:500">Password</label>
            <input type="password" placeholder="Create a strong password" id="pw-input" oninput="pwVal=this.value;document.getElementById('pw-strength').innerHTML=pwStrengthBarHTML(this.value)">
            <div id="pw-strength"></div>
          </div>
          <div><label style="color:#94a3b8;font-size:12px;font-family:'DM Sans',sans-serif;display:block;margin-bottom:5px;font-weight:500">Confirm Password</label><input type="password" placeholder="Repeat your password"></div>
          <div style="background:#0f1623;border:1px solid #1e2d45;border-radius:8px;padding:12px">
            <p style="color:#64748b;font-size:11px;font-family:'DM Sans',sans-serif;margin-bottom:7px;font-weight:500">Password must contain:</p>
            <div id="pw-rules">
              ${[["8+ characters", "len"], ["Uppercase letter", "upper"], ["Number", "num"], ["Special character", "spec"]].map(([r]) => `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="font-size:11px;color:#475569">○</span><span style="font-size:11px;color:#64748b;font-family:'DM Sans',sans-serif">${r}</span></div>`).join('')}
            </div>
          </div>
          <button onclick="go('onboarding')" style="background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;color:#fff;padding:11px 0;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600">Create Account →</button>
        </div>
        <p style="color:#475569;font-size:12px;text-align:center;margin-top:18px;font-family:'DM Sans',sans-serif">Already have an account? <span onclick="go('login')" style="color:#3b82f6;cursor:pointer">Sign in</span></p>
      </div>
    </div>`;

                case "forgot": return `
    <div style="min-height:100vh;background:#0a101a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px">
      <div style="width:100%;max-width:380px;background:#141e2e;border:1px solid #1e2d45;border-radius:16px;padding:32px">
        <div style="text-align:center;margin-bottom:24px">
          <div style="font-size:36px;margin-bottom:10px">🔐</div>
          <h2 style="font-family:'Playfair Display',Georgia,serif;font-size:22px;color:#f1f5f9">Forgot your password?</h2>
          <p style="color:#64748b;font-size:13px;margin-top:8px;font-family:'DM Sans',sans-serif;line-height:1.6">Enter your email and we'll send a reset link if an account exists.</p>
